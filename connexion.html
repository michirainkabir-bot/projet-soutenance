<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="connexion.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Page connexion</title>
</head>
<body>
    <script>
function togglePassword() {
    const passwordInput = document.getElementById("password");
    const eyeIcon = document.querySelector(".eye");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        icon.classList.add("fa-eye-slash");
    } else {
        passwordInput.type = "password";
        icon.classList.remove("fa-eye");;
    }
    
    if (input.value === "") return;
}
    </script>
    <div class="login-container">
        
        <div class="logo">
            <img src="1630545870253.png" alt="logo" width="170px" height="150px">
        </div>

    <!-- Card -->
    <div class="login-card">
        <h2>Se connecter</h2>

        <form onsubmit="login(event)" action="connexion.php" method="POST">
            <div class="input-group">
                <input type="email" placeholder="Adresse Email" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Mot de passe" required>
                <i class="fa-solid fa-eye eye" onclick="togglePassword()"></i>
            </div>

            <!-- Simulation du rôle -->
           <select id="role" required>
               <option value="">Choisir le rôle</option>
               <option value="admin">Administrateur</option>
               <option value="client">Client</option>
               <option value="technicien">Technicien</option>
            </select>


            <script>
                 function login(event) {
                 event.preventDefault();

                const role = document.getElementById("role").value;

                if (role === "client") {
                    window.location.href = "client.html";
                }
                else if (role === "admin") {
                    window.location.href = "dashboard admin.html";
                }
                else if (role === "technicien") {
                    window.location.href = "technicien.html";
                }
                else {
                   alert("Veuillez choisir un rôle");
                }
                       }
            </script>

            
            <div class="links">
                <a href="#">Mot de passe oublié ?</a>
                <a href="inscription.html">Créer un compte ?</a>
            </div>

            <button type="submit">Connexion</button>
        </form>
    </div>

</div>

</body>
</html>
